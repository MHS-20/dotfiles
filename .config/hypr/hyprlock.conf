# ~/.config/hypr/hyprlock.conf
# Hyprlock - lock screen for Hyprland
# https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/
#
# Uses wallpaper3.jpg as the lock screen background (separate from the desktop).
# Colors match your hyprland.conf: cyan (#33ccff) / green (#00ff99) accent,
# dark semi-transparent surfaces.

# ── General ──────────────────────────────────────────────────────────────────
general {
    hide_cursor = true
    grace = 3           # seconds after lock where moving the mouse dismisses it
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# ── Background ───────────────────────────────────────────────────────────────
background {
    monitor =
    path = ~/Images/HardArch.jpg

    # Blur the wallpaper behind the lock UI
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.7
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# ── Clock ─────────────────────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.92)
    font_size = 80
    font_family = JetBrains Mono Bold
    shadow_passes = 2
    shadow_size = 3

    position = 0, 200
    halign = center
    valign = center
}

# Date below the clock
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(255, 255, 255, 0.70)
    font_size = 18
    font_family = JetBrains Mono
    shadow_passes = 1

    position = 0, 120
    halign = center
    valign = center
}

# ── Password input ────────────────────────────────────────────────────────────
input-field {
    monitor =
    size = 300, 55
    outline_thickness = 2

    # Idle / unfocused border: matches col.inactive_border from hyprland.conf
    outer_color = rgba(595959aa)
    # Active / focused border: matches col.active_border gradient
    inner_color = rgba(20, 20, 20, 0.85)
    color = rgba(255, 255, 255, 0.9)   # text color while typing

    # Gradient border when active (mirrors your cyan→green 45deg gradient)
    check_color = rgba(33ccffee)
    fail_color = rgba(ff4444ee)

    font_family = JetBrains Mono
    font_size = 14

    placeholder_text = <span foreground="##aaaaaa"> Enter password…</span>
    fail_text = <span foreground="##ff4444"> Incorrect password</span>
    fail_timeout = 2000   # ms before clearing the fail message

    hide_input = false
    rounding = 10         # matches decoration.rounding in hyprland.conf

    dots_size = 0.27
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    position = 0, -80
    halign = center
    valign = center
}

# ── Hint label ────────────────────────────────────────────────────────────────
label {
    monitor =
    text = Type to unlock
    color = rgba(255, 255, 255, 0.40)
    font_size = 12
    font_family = JetBrains Mono

    position = 0, -145
    halign = center
    valign = center
}
