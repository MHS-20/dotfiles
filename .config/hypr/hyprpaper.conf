# ~/.config/hypr/hyprpaper.conf
# Hyprpaper - wallpaper daemon for Hyprland
# https://wiki.hypr.land/Hypr-Ecosystem/hyprpaper/
#
# Place your wallpapers in ~/Pictures/wallpapers/ and rename them:
#   wallpaper1.jpg  → main desktop background
#   wallpaper2.jpg  → secondary (e.g. second monitor)
#   wallpaper3.jpg  → used by hyprlock as the lock screen background
#
# Supported formats: jpg, jpeg, png, gif, webp

# ── Preload ──────────────────────────────────────────────────────────────────
# All wallpapers must be preloaded before they can be assigned.
# preload = /home/sentinel/Images/hyprland.png
# preload = /home/sentinel/Images/ArchPrism.png
# preload = /home/sentinel/Images/HardArch.jpg
preload = /home/sentinel/Images/hyprland.png

# ── Wallpaper assignment ──────────────────────────────────────────────────────
# Syntax: wallpaper = <monitor>,<path>
# Use an empty monitor name to target all monitors (single-monitor setup).
wallpaper = ,/home/sentinel/Images/hyprland.png

# If you have multiple monitors, comment the line above and use specific names:
# (find monitor names with: hyprctl monitors)
# wallpaper = HDMI-A-1,~/Pictures/wallpapers/wallpaper1.jpg
# wallpaper = DP-1,~/Pictures/wallpapers/wallpaper2.jpg

# ── Options ──────────────────────────────────────────────────────────────────
# Splash text shown on top of the wallpaper (disable if you prefer clean look)
splash = false

# IPC allows runtime wallpaper changes via: hyprctl hyprpaper wallpaper "...,..."
ipc = on
