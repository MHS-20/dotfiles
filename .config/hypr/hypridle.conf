# ~/.config/hypr/hypridle.conf
# Hypridle - idle daemon for Hyprland
# https://wiki.hypr.land/Hypr-Ecosystem/hypridle/
#
# Idle timeline:
#   2 min  → dim screen to 20% brightness
#   3 min  → lock screen with hyprlock
#   4 min  → turn off monitors (DPMS off)
#   5 min  → suspend system

general {
    # Command run before any lock_cmd to prevent sleep during e.g. video playback.
    # Requires systemd-inhibit (part of systemd, already on Arch).
    lock_cmd = pidof hyprlock || hyprlock   # only lock if not already locked
    before_sleep_cmd = loginctl lock-session # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpmsoff; sleep 1; hyprctl dispatch dpmsoff
}

# ── Step 1: dim the screen after 2 minutes ───────────────────────────────────
listener {
    timeout = 120  # seconds

    # Save current brightness, then dim to 20%
    on-timeout = brightnessctl -s set 20%
    # Restore brightness when activity resumes
    on-resume = brightnessctl -r
}

# ── Step 2: lock after 3 minutes ─────────────────────────────────────────────
listener {
    timeout = 180  # seconds

    on-timeout = loginctl lock-session
    # No on-resume needed here; unlock is handled by hyprlock
}

# ── Step 3: turn monitors off after 4 minutes ────────────────────────────────
listener {
    timeout = 240  # seconds

    on-timeout = hyprctl dispatch dpmsoff
    on-resume = hyprctl dispatch dpmson
}

# ── Step 4: suspend after 5 minutes ─────────────────────────────────────────
listener {
    timeout = 300  # seconds

    on-timeout = systemctl suspend
}
